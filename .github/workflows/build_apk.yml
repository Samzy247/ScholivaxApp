name: Build Scholivax APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Scaffold a fresh Flutter project (generates android/ project files)
        run: flutter create --platforms=android --org com.scholivax scholivax_scaffold

      - name: Overlay our app code on the scaffold
        run: |
          cp app/pubspec.yaml scholivax_scaffold/pubspec.yaml
          rm -rf scholivax_scaffold/lib
          cp -r app/lib scholivax_scaffold/lib
          rm -rf scholivax_scaffold/assets
          cp -r app/assets scholivax_scaffold/assets

      - name: Set applicationId to match the Firebase app registration
        # firebase_options.dart's config was generated for the Android app
        # registered in Firebase as "com.scholivax.app" — but `flutter
        # create --org com.scholivax scholivax_scaffold` on its own
        # produces "com.scholivax.scholivax_scaffold" instead. Google Play
        # Services checks the running app's actual applicationId against
        # what Firebase has on file, so a mismatch here would make FCM
        # registration silently fail. Force it to line up. (`namespace` is
        # compile-time only and doesn't need to match — left alone.)
        run: |
          GRADLE_KTS=scholivax_scaffold/android/app/build.gradle.kts
          GRADLE_GROOVY=scholivax_scaffold/android/app/build.gradle
          FILE="$GRADLE_KTS"
          [ -f "$FILE" ] || FILE="$GRADLE_GROOVY"
          sed -i -E 's/applicationId[[:space:]]*=?[[:space:]]*"[^"]*"/applicationId = "com.scholivax.app"/' "$FILE"
          grep -n applicationId "$FILE"

      - name: Ensure release build has internet + notification permissions
        # flutter create's default template only puts INTERNET /
        # ACCESS_NETWORK_STATE in the debug-only manifest, so a real
        # `flutter build apk --release` otherwise ships with no network
        # access at all — this adds them to the main manifest that release
        # actually uses. POST_NOTIFICATIONS is required on Android 13+ for
        # any notification (including FCM) to show at all.
        run: |
          MANIFEST=scholivax_scaffold/android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' "$MANIFEST"
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
          sed -i '/<manifest /a\    <uses-permission android:name="android.permission.CAMERA"/>' "$MANIFEST"
          sed -i -E 's/android:label="[^"]*"/android:label="Scholivax"/' "$MANIFEST"
          cat "$MANIFEST"

      - name: Install dependencies
        working-directory: scholivax_scaffold
        run: flutter pub get

      - name: Generate the app icon from our logo
        working-directory: scholivax_scaffold
        run: dart run flutter_launcher_icons

      - name: Enable core library desugaring (required by flutter_local_notifications)
        # flutter_local_notifications needs this turned on in the app
        # module's build.gradle. Rather than trying to sed-insert into
        # whatever the scaffold's existing compileOptions{}/dependencies{}
        # blocks look like (fragile — the previous attempt at this silently
        # failed to match and the build still failed with "requires core
        # library desugaring to be enabled for :app"), just APPEND a second,
        # self-contained android{} and dependencies{} block at the end of
        # the file. Gradle (both Groovy and Kotlin DSL) merges multiple
        # android{}/dependencies{} blocks in one file just fine — this is a
        # completely standard pattern, not a hack — so it works regardless
        # of how the rest of the file is structured.
        run: |
          GRADLE_KTS=scholivax_scaffold/android/app/build.gradle.kts
          GRADLE_GROOVY=scholivax_scaffold/android/app/build.gradle
          if [ -f "$GRADLE_KTS" ]; then
            printf '%s\n' '' 'android {' '    compileOptions {' '        isCoreLibraryDesugaringEnabled = true' '    }' '}' '' 'dependencies {' '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' '}' >> "$GRADLE_KTS"
            cat "$GRADLE_KTS"
          elif [ -f "$GRADLE_GROOVY" ]; then
            printf '%s\n' '' 'android {' '    compileOptions {' '        coreLibraryDesugaringEnabled true' '    }' '}' '' 'dependencies {' "    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'" '}' >> "$GRADLE_GROOVY"
            cat "$GRADLE_GROOVY"
          else
            echo "No app/build.gradle(.kts) found — scaffold layout changed, needs a look."
            exit 1
          fi

      - name: Patch flutter_inappwebview's outdated proguard reference
        # flutter_inappwebview_android's own build.gradle still calls
        # getDefaultProguardFile('proguard-android.txt'), which newer
        # Android Gradle Plugin/R8 versions reject outright. This is a
        # bug in that plugin release, not our code — patch the cached
        # package file directly so the build can proceed.
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          find "$PUB_CACHE_DIR/hosted" -path "*flutter_inappwebview_android*/android/build.gradle" -print -exec \
            sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" {} \;

      - name: Build release APK (split per ABI — smaller downloads)
        # A single "universal" APK bundles native libraries for every
        # CPU architecture (arm64-v8a, armeabi-v7a, x86_64) in one file,
        # which is most of where the size goes for an app using
        # flutter_inappwebview/firebase_messaging/mobile_scanner. This
        # doesn't touch any code — it's the same app, just packaged as
        # one APK per architecture instead of all three bundled together,
        # so a real device only downloads the one it actually needs.
        working-directory: scholivax_scaffold
        run: flutter build apk --release --split-per-abi

      - name: Upload APK (arm64-v8a — use this one; virtually all phones from the last ~6 years are this)
        uses: actions/upload-artifact@v4
        with:
          name: scholivax-app-arm64
          path: scholivax_scaffold/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload APK (armeabi-v7a — only for very old/32-bit devices)
        uses: actions/upload-artifact@v4
        with:
          name: scholivax-app-armv7
          path: scholivax_scaffold/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
