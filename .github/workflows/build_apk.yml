name: Build Scholivax APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Scaffold a fresh Flutter project (generates android/ project files)
        run: flutter create --platforms=android --org com.scholivax scholivax_scaffold

      - name: Overlay our app code on the scaffold
        run: |
          cp app/pubspec.yaml scholivax_scaffold/pubspec.yaml
          rm -rf scholivax_scaffold/lib
          cp -r app/lib scholivax_scaffold/lib

      - name: Install dependencies
        working-directory: scholivax_scaffold
        run: flutter pub get

      - name: Build release APK
        working-directory: scholivax_scaffold
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scholivax-app-release
          path: scholivax_scaffold/build/app/outputs/flutter-apk/app-release.apk
